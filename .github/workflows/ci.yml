name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Backend — lint + tests con PostgreSQL real
  # ─────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: focus
          POSTGRES_PASSWORD: focus
          POSTGRES_DB: focus_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app/

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+psycopg2://focus:focus@localhost:5432/focus_test
          JWT_SECRET_KEY: ci-secret-key-64-chars-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          FRONTEND_URL: http://localhost:3000
          ENVIRONMENT: test
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg2://focus:focus@localhost:5432/focus_test
          JWT_SECRET_KEY: ci-secret-key-64-chars-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          FRONTEND_URL: http://localhost:3000
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # Frontend — typecheck + build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.up.railway.app
          VITE_APP_ENV: production
